repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast)
        entry: python -m pytest tests/ -x -q --ignore=tests/test_quality_gate.py
        language: system
        types: [python]
        pass_filenames: false
