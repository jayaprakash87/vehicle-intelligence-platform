# Full vehicle sedan topology — 52 eFuse channels across 4 Zone Controllers
# Uses the built-in sedan topology from the eFuse catalog.
#
# Architecture:
#   eFuse IC (HW) → SPI → CDD (Complex Device Driver) → COM → CAN bus
#   Zone Controller = physical ECU running the CDD software
#
# Zone Controllers:
#   zone_body      (16 ch)  — interior lights, mirrors, locks, windows, seats
#   zone_front     (14 ch)  — headlamps, wipers, horn, ADAS sensors
#   zone_rear      (10 ch)  — tail lights, defroster, trunk, parking sensors
#   zone_underhood (12 ch)  — engine fan, fuel pump, HVAC, engine peripherals

simulation:
  scenario_id: sedan_full_vehicle
  name: "Sedan Full Vehicle — 52 Channels"
  description: "Mid-size sedan with 4 zone controllers and 52 eFuse channels"
  duration_s: 60.0
  sample_interval_ms: 100.0
  seed: 42
  vehicle_topology: sedan

  fault_injections:
    # Overload on headlamp low beam (ch_017) — simulates resistive heater failure
    - channel_id: ch_017
      fault_type: overload_spike
      start_s: 10.0
      duration_s: 3.0
      intensity: 0.8

    # Thermal drift on seat heater (ch_015) — PTC aging
    - channel_id: ch_015
      fault_type: thermal_drift
      start_s: 15.0
      duration_s: 20.0
      intensity: 0.6

    # Intermittent overload on window motor (ch_011) — stuck window
    - channel_id: ch_011
      fault_type: intermittent_overload
      start_s: 25.0
      duration_s: 5.0
      intensity: 0.7

    # Voltage sag during engine cranking — affects all underhood
    - channel_id: ch_041
      fault_type: voltage_sag
      start_s: 5.0
      duration_s: 2.0
      intensity: 0.9

    # Gradual degradation on engine fan (ch_041) — bearing wear
    - channel_id: ch_041
      fault_type: gradual_degradation
      start_s: 30.0
      duration_s: 25.0
      intensity: 0.4

    # Dropped packets on ADAS camera power — EMI in harness
    - channel_id: ch_029
      fault_type: dropped_packet
      start_s: 20.0
      duration_s: 10.0
      intensity: 0.5

features:
  window_duration_s: 5.0
  min_duration_s: 1.0

normalizer:
  ffill_tolerance_s: 0.5
  missing_rate_window_s: 5.0

model:
  anomaly_contamination: auto
  anomaly_n_estimators: 150
  model_dir: artifacts/models

storage:
  output_dir: output
  format: parquet
